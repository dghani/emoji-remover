name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: emoji-remover
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: emoji-remover.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: emoji-remover
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: emoji-remover

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a ../../../emoji-remover-${{ matrix.target }}.zip ${{ matrix.binary }}
        else
          tar czf ../../../emoji-remover-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
        fi
        cd -
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: emoji-remover-${{ matrix.target }}
        path: emoji-remover-${{ matrix.target }}.*

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          emoji-remover-*/emoji-remover-*.tar.gz
          emoji-remover-*/emoji-remover-*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}